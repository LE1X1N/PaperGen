version: '3'

services:
  papergen: 
    build: .
    image: papergen-nightly-build:latest
    container_name: papergen-service
    volumes:
      - ./:/app      # 代码挂载
    entrypoint: /bin/bash
    tty: true
    network_mode: host
    depends_on:
      - mongodb
      - selenium

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: papergen-selenium
    shm_size: 2g
    network_mode: host
    environment:
      - SE_NODE_MAX_SESSIONS=10     # chrome sessions
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_OPTS=--port 4444         # port for selenium service
      - JAVA_OPTS=-Dotel.traces.exporter=none -Dotel.metrics.exporter=none -Dotel.logs.exporter=none

  mongodb:
    image: mongo:7.0.12
    container_name: papergen-mongodb
    volumes: 
      - ~/mongodb-data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=123456