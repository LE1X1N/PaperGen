services:
  # Python Image
  leixin-coder-artifacts:
    build: .
    image: leixin/coder-artifacts-dev:latest
    container_name: leixin-coder-app
    volumes:
      - ./:/app   # 代码挂载
    entrypoint: /bin/bash
    tty: true
    environment:
      - APP_ENV=dev                # dev/prod,  load dev.yaml
    network_mode: host